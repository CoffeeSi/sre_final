apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: product-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
        env:
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: endterm-config
              key: PRODUCT_SERVICE_PORT
        envFrom:
        - configMapRef:
            name: endterm-config
