apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: user-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8001
        env:
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: endterm-config
              key: USER_SERVICE_PORT
        envFrom:
        - configMapRef:
            name: endterm-config
