apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: payment-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8004
        env:
        - name: SERVICE_PORT
          valueFrom:
            configMapKeyRef:
              name: endterm-config
              key: PAYMENT_SERVICE_PORT
        envFrom:
        - configMapRef:
            name: endterm-config
